spring:
  application:
    name: heritage-backend
  datasource:
    url: jdbc:mysql://localhost:3306/heritage_db?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 741523
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8083
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.henan.heritage.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: heritage_secret_key
  expiration: 3600000